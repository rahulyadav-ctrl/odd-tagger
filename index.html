<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODD Tagger</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f2;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#111;--text2:#555;--text3:#999;
  --blue:#185FA5;--blue-bg:#e6f1fb;--blue-t:#0c447c;
  --green:#3B6D11;--green-bg:#eaf3de;
  --amber:#854F0B;--amber-bg:#faeeda;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --pink:#993556;--pink-bg:#FBEAF0;
  --red:#A32D2D;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#shell{max-width:1120px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
#header h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
#header h1 span{color:var(--blue)}
.key-row{display:flex;align-items:center;gap:8px}
#key-input{font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);width:260px;font-family:monospace;background:var(--surface);color:var(--text)}
.btn{padding:7px 15px;font-size:13px;font-weight:500;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-blue:hover{background:var(--blue-t)}
.btn-blue:disabled{background:var(--blue);opacity:.38}

/* DROP ZONE */
#drop-zone{border:2px dashed var(--border2);border-radius:var(--rl);background:var(--surface);padding:36px 20px;text-align:center;cursor:pointer;transition:all .15s}
#drop-zone:hover,#drop-zone.drag{border-color:var(--blue);background:var(--blue-bg)}
#drop-zone svg{width:38px;height:38px;color:var(--text3);margin-bottom:8px}
#drop-zone p{font-size:14px;color:var(--text2);margin-bottom:3px}
#drop-zone small{font-size:12px;color:var(--text3)}
#file-input{display:none}

/* MAIN CARD */
#main-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;display:none}

/* VIDEO ROW */
#video-row{display:flex;border-bottom:1px solid var(--border)}
#video-pane{flex:1;background:#0c0c0c;min-height:210px;display:flex;align-items:center;justify-content:center;position:relative}
#video-pane video{width:100%;max-height:290px;display:block;object-fit:contain}
#vid-info{position:absolute;bottom:7px;left:10px;font-size:11px;color:rgba(255,255,255,.55);background:rgba(0,0,0,.5);padding:2px 9px;border-radius:20px}

#ai-pane{width:255px;flex-shrink:0;padding:15px;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.pane-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
#status-row{display:flex;align-items:center;gap:8px}
#sdot{width:9px;height:9px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .2s}
#sdot.thinking{background:#EF9F27;animation:pulse 1s infinite}
#sdot.done{background:var(--green)}
#sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.28}}
#slabel{font-size:13px;font-weight:500}
#ssub{font-size:11px;color:var(--text3);line-height:1.55}
#frame-strip{display:flex;gap:4px;flex-wrap:wrap}
.fthumb{width:54px;height:30px;border-radius:4px;object-fit:cover;border:1px solid var(--border)}
.fthumb.loading{background:#1a1a1a}

/* TAGS */
#tag-section{padding:15px 18px}
#tag-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
#tag-top h2{font-size:14px;font-weight:600}
#tag-actions{display:flex;gap:7px;align-items:center}
#sel-count{font-size:12px;color:var(--text2);background:var(--bg);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

/* Tag groups laid out in 2-col grid for dense display */
#groups{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){#groups{grid-template-columns:1fr}}
.tg{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tg.full-width{grid-column:1/-1}
.tg-head{padding:7px 13px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;background:var(--bg);border-bottom:1px solid var(--border)}
.cat-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.cat-ego   {background:var(--pink-bg);  color:var(--pink)}
.cat-actor {background:var(--purple-bg);color:var(--purple)}
.cat-motion{background:var(--amber-bg); color:var(--amber)}
.cat-infra {background:var(--blue-bg);  color:var(--blue-t)}
.cat-env   {background:var(--green-bg); color:var(--green)}
.sel-badge{margin-left:auto;font-size:10px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:1px 7px;border-radius:20px;display:none}
.sel-badge.show{display:inline}

/* Subgroup label inside chips area */
.sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:6px 13px 2px;display:block}
.chips{padding:6px 13px 10px;display:flex;flex-wrap:wrap;gap:5px;background:var(--surface)}

.chip{font-size:11px;padding:3px 11px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--surface);cursor:pointer;user-select:none;transition:all .1s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.ai{border-style:dashed;border-color:var(--blue);color:var(--blue-t);background:var(--blue-bg)}
.chip.sel{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;border-style:solid}

/* RESULT BAR */
#result-bar{padding:12px 18px;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
#result-note{font-size:12px;color:var(--text2)}
#export-row{display:flex;gap:7px}

/* LEGEND */
.legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.lc-ai{font-size:10px;padding:2px 8px;border-radius:20px;border:1px dashed var(--blue);color:var(--blue-t);background:var(--blue-bg)}
.lc-sel{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--blue);color:#fff;border:1px solid var(--blue)}
</style>
</head>
<body>
<div id="shell">

  <div id="header">
    <h1>ODD <span>Sequence Tagger</span></h1>
    <div class="key-row" style="flex-wrap:wrap;">
      <span style="font-size:12px;color:var(--text3)">Gemini API key</span>
      <input type="text" id="key-input" type="password" placeholder="AIza..." style="font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);width:280px;font-family:monospace;background:var(--surface);color:var(--text)">
      <input type="email" id="email-input" placeholder="labeller@deepen.ai" style="font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);width:180px;background:var(--surface);color:var(--text)" title="Labeller email for JSON export" />
      <input type="text" id="labelset-input" placeholder="label_set_id" value="test" style="font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);width:100px;background:var(--surface);color:var(--text)" title="label_set_id for JSON export" />
      <button class="btn btn-blue" id="tag-btn" onclick="startTag()" disabled>&#9654; Analyse &amp; Tag</button>
    </div>
  </div>

  <div id="drop-zone"
       onclick="document.getElementById('file-input').click()"
       ondragover="event.preventDefault();this.classList.add('drag')"
       ondragleave="this.classList.remove('drag')"
       ondrop="handleDrop(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.899L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
    <p>Drop a video here, or click to browse</p>
    <small>MP4  MOV  AVI  any dashcam sequence</small>
  </div>
  <input type="file" id="file-input" accept="video/*" onchange="loadVideo(this.files[0])">

  <div id="main-card">
    <div id="video-row">
      <div id="video-pane">
        <video id="vid" controls></video>
        <div id="vid-info"></div>
      </div>
      <div id="ai-pane">
        <div class="pane-title">Analysis</div>
        <div id="status-row"><div id="sdot"></div><span id="slabel">Ready</span></div>
        <div id="ssub">Load a video then click Analyse &amp; Tag.</div>
        <div id="frame-strip"></div>
        <div style="margin-top:auto;padding-top:8px">
          <div class="legend">
            <div class="li"><span class="lc-ai">tag</span> AI suggested</div>
            <div class="li"><span class="lc-sel">tag</span> Selected</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tag-section">
      <div id="tag-top">
        <h2>Tags &mdash; click to add or remove</h2>
        <div id="tag-actions">
          <span id="sel-count">0 selected</span>
          <button class="btn" onclick="clearAll()">&times; Clear all</button>
        </div>
      </div>
      <div id="groups"></div>
    </div>

    <div id="result-bar">
      <div id="result-note">Review tags above, then export.</div>
      <div id="export-row">
        <button class="btn btn-blue" onclick="exportCSV()">&#11015; Export CSV row</button>
        <button class="btn" onclick="exportJSON()">&#11015; Export JSON</button>
        <button class="btn" onclick="copyJSON()">&#9112; Copy JSON</button>
        <button class="btn" onclick="loadNew()">&#8635; New video</button>
      </div>
    </div>
  </div>

</div>
<script>
//  EXACT TAXONOMY from ZOD Deepen AI Simplified ODD Taxonomy xlsx 
// Leaf tags only  intermediate grouping nodes excluded
// Correct names: traffic_control_devices (not traffic_control), road_surface_conditions (not road_surface)

// Each leaf entry: { path_suffix, label }
// path_suffix appended to root:group to form full path
// label is exactly what shows on the chip  no spaces, underscores throughout
const TX = {
  ego_motion: {
    label: "Ego_Motion", cat: "ego", full: true,
    groups: {
      "cruising":               [{s:"straight_road",      l:"straight_road"},
                                 {s:"curved_road",        l:"curved_road"}],
      "following":              [{s:"straight_road",      l:"straight_road"},
                                 {s:"curved_road",        l:"curved_road"}],
      "lane_change":            [{s:"left",               l:"left"},
                                 {s:"right",              l:"right"}],
      "merging":                [{s:"on_ramp",            l:"on_ramp"},
                                 {s:"lanes",              l:"lanes"}],
      "diverging":              [{s:"off_ramp",           l:"off_ramp"},
                                 {s:"lanes",              l:"lanes"}],
      "turning":                [{s:"left:protected",     l:"left:protected"},
                                 {s:"left:unprotected",   l:"left:unprotected"},
                                 {s:"right:protected",    l:"right:protected"},
                                 {s:"right:unprotected",  l:"right:unprotected"},
                                 {s:"u_turn",             l:"u_turn"}],
      "intersection_traversal": [{s:"straight",           l:"straight"},
                                 {s:"gridlocked",         l:"gridlocked"},
                                 {s:"other",              l:"other"}],
      "stopping":               [{s:"traffic_congestion",            l:"traffic_congestion"},
                                 {s:"traffic_sign",                  l:"traffic_sign"},
                                 {s:"emergency_situation:pullover",  l:"emergency_situation:pullover"}],
      "yielding":               [{s:"nominal_vehicle",    l:"nominal_vehicle"},
                                 {s:"emergency_vehicle",  l:"emergency_vehicle"},
                                 {s:"vru",                l:"vru"}],
      "":                      [{s:"evasive_motion",     l:"evasive_motion"}],
    }
  },
  primary_actor_class: {
    label: "Primary_Actor_Class", cat: "actor", full: false,
    groups: {
      "actor":           [{s:"car",        l:"car"},
                          {s:"truck",      l:"truck"},
                          {s:"bus",        l:"bus"},
                          {s:"animal",     l:"animal"}],
      "vru":             [{s:"motorcycle", l:"motorcycle"},
                          {s:"bicycle",    l:"bicycle"},
                          {s:"pedestrian", l:"pedestrian"}],
      "construction_sign":[{s:"traffic_cone", l:"traffic_cone"},
                            {s:"barrier",      l:"barrier"}],
    }
  },
  primary_actor_motion: {
    label: "Primary_Actor_Motion", cat: "motion", full: true,
    groups: {
      "longitudinal":    [{s:"acceleration",        l:"acceleration"},
                          {s:"deceleration",         l:"deceleration"},
                          {s:"cruising",             l:"cruising"},
                          {s:"hard_brake",           l:"hard_brake"},
                          {s:"standstill",           l:"standstill"},
                          {s:"turning_front_of_ego", l:"turning_front_of_ego"}],
      "lateral":         [{s:"cut_in:aggressive",    l:"cut_in:aggressive"},
                          {s:"cut_in:normal",        l:"cut_in:normal"},
                          {s:"cut_out:aggressive",   l:"cut_out:aggressive"},
                          {s:"cut_out:normal",       l:"cut_out:normal"},
                          {s:"drifting:in_lane",     l:"drifting:in_lane"},
                          {s:"drifting:out_of_lane", l:"drifting:out_of_lane"},
                          {s:"swerving",             l:"swerving"}],
      "intersection_traversal":[
                          {s:"crossing_ego_path",              l:"crossing_ego_path"},
                          {s:"turning_left_across_traffic",    l:"turning_left_across_traffic"},
                          {s:"turning_right_across_traffic",   l:"turning_right_across_traffic"},
                          {s:"stop_sign_handling",             l:"stop_sign_handling"}],
      "vru_actions":     [{s:"walking_parallel_road", l:"walking_parallel_road"},
                          {s:"crosswalk_motion",      l:"crosswalk_motion"},
                          {s:"jaywalking",            l:"jaywalking"},
                          {s:"falling_in_roadway",    l:"falling_in_roadway"},
                          {s:"other",                 l:"other"}],
      "erratic_motion":  [{s:"wrong_way_driving",     l:"wrong_way_driving"},
                          {s:"multiple_lane_changes",  l:"multiple_lane_changes"},
                          {s:"ignore_right_of_way",    l:"ignore_right_of_way"},
                          {s:"other",                  l:"other"}],
    }
  },
  primary_infra: {
    label: "Primary_Infra", cat: "infra", full: true,
    groups: {
      "road_type":       [{s:"highway:divided",          l:"highway:divided"},
                          {s:"highway:undivided",         l:"highway:undivided"},
                          {s:"urban_arterial:divided",    l:"urban_arterial:divided"},
                          {s:"urban_arterial:undivided",  l:"urban_arterial:undivided"},
                          {s:"urban_local",               l:"urban_local"},
                          {s:"on_ramp",                   l:"on_ramp"},
                          {s:"off_ramp",                  l:"off_ramp"},
                          {s:"bridge",                    l:"bridge"}],
      "road_geometry":   [{s:"straight_segment",          l:"straight_segment"},
                          {s:"elevation:incline",         l:"elevation:incline"},
                          {s:"elevation:decline",         l:"elevation:decline"},
                          {s:"lane_ops",                  l:"lane_ops"},
                          {s:"lane_additions",            l:"lane_additions"},
                          {s:"curved_segment",            l:"curved_segment"},
                          {s:"merged_segment",            l:"merged_segment"}],
      "intersection":    [{s:"signalized:traffic_lights",   l:"signalized:traffic_lights"},
                          {s:"unsignalized:stop_sign",      l:"unsignalized:stop_sign"},
                          {s:"unsignalized:yield_sign",     l:"unsignalized:yield_sign"},
                          {s:"roundabout",                  l:"roundabout"},
                          {s:"t_junction",                  l:"t_junction"},
                          {s:"u_turn",                      l:"u_turn"},
                          {s:"crosswalk",                   l:"crosswalk"}],
      "road_marking":    [{s:"solid_line:yellow",           l:"solid_line:yellow"},
                          {s:"solid_line:white",            l:"solid_line:white"},
                          {s:"dashed_line:yellow",          l:"dashed_line:yellow"},
                          {s:"dashed_line:white",           l:"dashed_line:white"},
                          {s:"double_line:yellow",          l:"double_line:yellow"},
                          {s:"double_line:white",           l:"double_line:white"},
                          {s:"dotted:white",                l:"dotted:white"},
                          {s:"unmarked_segment",            l:"unmarked_segment"}],
      "traffic_control_devices":[
                          {s:"traffic_lights",       l:"traffic_lights"},
                          {s:"stop_sign",            l:"stop_sign"},
                          {s:"yield_sign",           l:"yield_sign"},
                          {s:"speed_limit_sign",     l:"speed_limit_sign"},
                          {s:"construction_element", l:"construction_element"},
                          {s:"other",                l:"other"}],
    }
  },
  environment: {
    label: "Environment", cat: "env", full: true,
    groups: {
      "illumination":    [{s:"daylight",                  l:"daylight"},
                          {s:"dawn",                       l:"dawn"},
                          {s:"dusk",                       l:"dusk"},
                          {s:"night:street_lit",           l:"night:street_lit"},
                          {s:"night:unlit",                l:"night:unlit"},
                          {s:"sun_glare",                  l:"sun_glare"},
                          {s:"abrupt_light_transitions",   l:"abrupt_light_transitions"},
                          {s:"cloudy",                     l:"cloudy"}],
      "precipitation":   [{s:"dry",                l:"dry"},
                          {s:"rain",               l:"rain"},
                          {s:"snow",               l:"snow"},
                          {s:"sleet",              l:"sleet"},
                          {s:"fog",                l:"fog"},
                          {s:"smog_smoke",         l:"smog_smoke"},
                          {s:"blowing_dust_sand",  l:"blowing_dust_sand"}],
      "road_surface_conditions":[
                          {s:"dry",            l:"dry"},
                          {s:"wet",            l:"wet"},
                          {s:"standing_water", l:"standing_water"},
                          {s:"snow_covered",   l:"snow_covered"},
                          {s:"black_ice",      l:"black_ice"},
                          {s:"snow_slush",     l:"snow_slush"},
                          {s:"mud",            l:"mud"}],
    }
  }
};

// Build flat set of all valid full tag paths
const ALL_VALID = new Set();
for (const [root, def] of Object.entries(TX)) {
  for (const [grp, leaves] of Object.entries(def.groups)) {
    for (const {s} of leaves) {
      let path;
      if (grp === '') {
        path = `${root}:${s}`;
      } else if (root === 'primary_actor_class') {
        path = grp === 'actor' ? `${root}:${s}` : `${root}:${grp}:${s}`;
      } else if (grp === 'turning') {
        // s is already "left:protected", "u_turn" etc  just prepend root:turning:
        path = `${root}:turning:${s}`;
      } else {
        path = `${root}:${grp}:${s}`;
      }
      ALL_VALID.add(path);
    }
  }
}

//  STATE 
let state = { file:null, name:'', selected:new Set(), aiSuggested:new Set() };

//  KEY 
const keyEl = document.getElementById('key-input'); 
const emailEl = document.getElementById('email-input');
const labelsetEl = document.getElementById('labelset-input');

if(localStorage.getItem('gemini_key')) ollamaUrlEl.value=localStorage.getItem('gemini_key'); if(localStorage.getItem('gemini_model')) modelEl.value=localStorage.getItem('gemini_model');
const savedEmail = localStorage.getItem('ant_email');
if (savedEmail) emailEl.value = savedEmail;
const savedLabelset = localStorage.getItem('ant_labelset');
if (savedLabelset) labelsetEl.value = savedLabelset;

ollamaUrlEl.addEventListener('input',()=>localStorage.setItem('gemini_key',ollamaUrlEl.value.trim())); modelEl.addEventListener('input',()=>localStorage.setItem('gemini_model',modelEl.value.trim()));
emailEl.addEventListener('input', () => localStorage.setItem('ant_email', emailEl.value.trim()));
labelsetEl.addEventListener('input', () => localStorage.setItem('ant_labelset', labelsetEl.value.trim()));
function getKey(){return document.getElementById('key-input')?.value.trim()||localStorage.getItem('gemini_key')||'';}

//  DROP / LOAD 
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(f);
}

function loadVideo(file) {
  if (!file) return;
  state = { file, name: file.name.replace(/\.[^.]+$/, ''), selected: new Set(), aiSuggested: new Set() };
  const vid = document.getElementById('vid');
  vid.src = URL.createObjectURL(file);
  vid.load();
  vid.addEventListener('loadedmetadata', () => {
    const mb = (file.size / 1e6).toFixed(1);
    const dur = isFinite(vid.duration) ? vid.duration.toFixed(1) + 's' : '';
    document.getElementById('vid-info').textContent = `${file.name}    ${mb} MB  ${dur ? '  ' + dur : ''}`;
  }, { once: true });
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('main-card').style.display = 'block';
  document.getElementById('tag-btn').disabled = false;
  setStatus('', 'Ready', 'Click Analyse & Tag to auto-tag this sequence.');
  renderGroups();
  updateCount();
}

function loadNew() {
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('main-card').style.display = 'none';
  document.getElementById('tag-btn').disabled = true;
  document.getElementById('frame-strip').innerHTML = '';
  document.getElementById('file-input').value = '';
  state = { file: null, name: '', selected: new Set(), aiSuggested: new Set() };
}

//  STATUS 
function setStatus(cls, label, sub) {
  document.getElementById('sdot').className = cls;
  document.getElementById('slabel').textContent = label;
  document.getElementById('ssub').textContent = sub;
}

//  FRAME EXTRACTION 
function extractFrames(count = 8) {
  return new Promise((resolve, reject) => {
    const vid = document.getElementById('vid');
    const dur = vid.duration;
    if (!dur || isNaN(dur)) { reject(new Error('Video metadata not ready  try again in a moment.')); return; }

    const times = Array.from({ length: count }, (_, i) => dur * (0.05 + 0.9 * i / (count - 1)));
    const results = []; let idx = 0;

    const strip = document.getElementById('frame-strip');
    strip.innerHTML = Array(count).fill(0).map(() => '<div class="fthumb loading"></div>').join('');

    function next() {
      if (idx >= times.length) { resolve(results); return; }
      vid.currentTime = times[idx];
    }

    vid.onseeked = () => {
      const c = document.createElement('canvas');
      c.width = 640; c.height = 360;
      c.getContext('2d').drawImage(vid, 0, 0, 640, 360);
      c.toBlob(blob => {
        const r = new FileReader();
        r.onload = () => {
          const b64 = r.result.split(',')[1];
          results.push(b64);
          const img = document.createElement('img');
          img.className = 'fthumb';
          img.src = r.result;
          const placeholder = strip.children[idx];
          if (placeholder) strip.replaceChild(img, placeholder);
          idx++;
          next();
        };
        r.readAsDataURL(blob);
      }, 'image/jpeg', 0.85);
    };
    next();
  });
}

//  AUTO TAG 
async function startTag() {
  if (!state.file) { alert('Load a video first.'); return; }
  const key = getKey(); if (!key) { alert('Enter your Gemini API key.'); document.getElementById('tag-btn').disabled=false; return; }

  document.getElementById('tag-btn').disabled = true;
  setStatus('thinking', 'Extracting frames', 'Sampling 8 keyframes from the video');

  let frames;
  try {
    frames = await extractFrames(8);
  } catch (e) {
    setStatus('err', 'Frame error', e.message);
    document.getElementById('tag-btn').disabled = false;
    return;
  }

  setStatus('thinking', 'Analysing', 'Sending frames to Claude Vision API');

  // Build exact valid tag list for the prompt
  const validList = [...ALL_VALID].sort().map(t => '  ' + t).join('\n');

  const content = [];
  frames.forEach((b64, i) => {
    content.push({ type: 'text', text: `Frame ${i + 1} of ${frames.length}:` });
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } });
  });
  content.push({
    type: 'text', text: `You are an expert AV data annotator tagging a dashcam sequence using the ODD taxonomy.

VALID TAGS (use ONLY these exact strings, no others):
${validList}

INSTRUCTIONS:
1. Return ONLY a valid JSON array of tag strings  no markdown, no explanation
2. Use ONLY tags from the list above, copied exactly
3. Cover all 5 categories: ego_motion, primary_actor_class, primary_actor_motion, primary_infra, environment
4. For environment: always include one illumination tag + one precipitation tag + one road_surface_conditions tag
5. For primary_actor_motion: only tag if an actor is clearly present
6. Be thorough  include every clearly applicable tag
7. For ego_motion pick all motions that clearly occur in the sequence

Example output format (values are illustrative only):
["ego_motion:following:curved_road","primary_actor_class:truck","primary_actor_motion:longitudinal:cruising","primary_infra:road_type:on_ramp","primary_infra:road_geometry:curved_segment","primary_infra:road_marking:dashed_line:white","primary_infra:traffic_control_devices:construction_element","environment:illumination:daylight","environment:precipitation:dry","environment:road_surface_conditions:dry"]`
  });

  try {
    const validList=[...ALL_VALID].sort().map(t=>'  '+t).join('\n');
  const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+getKey(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[...frames.map((b,i)=>[{text:'Frame '+(i+1)+':'},{ inline_data:{mime_type:'image/jpeg',data:b}}]).flat(),{text:'You are an expert AV data annotator.\n\nVALID TAGS:\n'+validList+'\n\nReturn ONLY a JSON array of tag strings. Cover all 5 categories.'}]}]})});

    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || resp.statusText); }
    const data = await resp.json();
    const raw = (data.candidates?.[0]?.content?.parts?.[0]?.text || '[]').replace(/```json|```/g,'').trim();

    let tags;
    try { tags = JSON.parse(raw); }
    catch { const m = raw.match(/\[[\s\S]*?\]/); tags = m ? JSON.parse(m[0]) : []; }

    const valid   = tags.filter(t => ALL_VALID.has(t));
    const invalid = tags.filter(t => !ALL_VALID.has(t));
    if (invalid.length) console.warn('AI returned invalid tags (ignored):', invalid);

    state.aiSuggested = new Set(valid);
    state.selected    = new Set(valid);

    renderGroups();
    updateCount();
    setStatus('done', 'Done', `${valid.length} tags applied. Review below.`);
    document.getElementById('result-note').textContent = `${valid.length} tags  verify and export when ready.`;
  } catch (e) {
    setStatus('err', 'API error', e.message);
    console.error(e);
  }
  document.getElementById('tag-btn').disabled = false;
}

//  RENDER TAGS 
function renderGroups() {
  const groupsEl = document.getElementById('groups');
  groupsEl.innerHTML = '';

  for (const [root, def] of Object.entries(TX)) {
    const selInGroup = [...state.selected].filter(t => t.startsWith(root + ':')).length;
    const div = document.createElement('div');
    div.className = 'tg' + (def.full ? ' full-width' : '');

    const badge = selInGroup > 0 ? `<span class="sel-badge show">${selInGroup}</span>` : `<span class="sel-badge"></span>`;
    let html = `<div class="tg-head"><span class="cat-pill cat-${def.cat}">${def.cat}</span><span>${def.label}</span>${badge}</div>`;

    for (const [grp, leaves] of Object.entries(def.groups)) {
      const showSub = grp !== '' && grp !== 'actor';
      if (showSub) html += `<span class="sub-label">${grp}</span>`;

      html += `<div class="chips">`;
      for (const {s, l} of leaves) {
        // Build full path
        let full;
        if (grp === '') {
          full = `${root}:${s}`;
        } else if (root === 'primary_actor_class') {
          full = grp === 'actor' ? `${root}:${s}` : `${root}:${grp}:${s}`;
        } else if (grp === 'turning') {
          full = `${root}:turning:${s}`;
        } else {
          full = `${root}:${grp}:${s}`;
        }

        const sel = state.selected.has(full);
        const ai  = state.aiSuggested.has(full);
        html += `<span class="chip ${sel ? 'sel' : (ai ? 'ai' : '')}" onclick="toggle('${full}')" title="${full}">${l}</span>`;
      }
      html += `</div>`;
    }

    div.innerHTML = html;
    groupsEl.appendChild(div);
  }
}

function toggle(full) {
  state.selected.has(full) ? state.selected.delete(full) : state.selected.add(full);
  renderGroups();
  updateCount();
}

function clearAll() {
  state.selected.clear();
  renderGroups();
  updateCount();
}

function updateCount() {
  document.getElementById('sel-count').textContent = `${state.selected.size} selected`;
}

//  EXPORT 
function exportCSV() {
  const cols = [...ALL_VALID].sort();
  const header = ['sequence_name', ...cols].join(',');
  const row    = [`"${state.name}"`, ...cols.map(c => state.selected.has(c) ? '1' : '0')].join(',');
  dl(state.name + '_tags.csv', header + '\n' + row, 'text/csv');
}

function exportJSON() {
  const email = document.getElementById('email-input').value.trim() || 'import@deepen.ai';
  const labelSetId = document.getElementById('labelset-input').value.trim() || 'test';
  const now = Date.now();
  const fps = 10; // standard for ZOD sequences

  // Derive frame count from video duration at 10fps
  const vid = document.getElementById('vid');
  const frameCount = (vid && isFinite(vid.duration) && vid.duration > 0)
    ? Math.round(vid.duration * fps)
    : 201; // fallback

  // Build flat attributes object from selected tags
  // Key = group name (e.g. "road_type", "cruising", "longitudinal")
  // Value = leaf value (e.g. "highway:divided", "straight_road", "cruising")
  const attributes = {};
  for (const full of state.selected) {
    const parts = full.split(':');
    const root = parts[0];           // e.g. "ego_motion", "primary_infra"
    // Find the group and leaf for this full path
    const def = TX[root];
    if (!def) continue;
    for (const [grp, leaves] of Object.entries(def.groups)) {
      for (const {s} of leaves) {
        let candidate;
        if (grp === '') candidate = `${root}:${s}`;
        else if (root === 'primary_actor_class') candidate = grp === 'actor' ? `${root}:${s}` : `${root}:${grp}:${s}`;
        else if (grp === 'turning') candidate = `${root}:turning:${s}`;
        else candidate = `${root}:${grp}:${s}`;

        if (candidate === full) {
          // attribute key = group name, value = leaf s
          // Special cases matching reference JSON keys:
          let attrKey = grp === '' ? s  // evasive_motion -> key is itself
            : grp === 'actor' ? 'primary_actor_class'
            : grp === 'turning' ? 'turning'
            : grp;  // cruising, following, longitudinal, lateral, road_type, road_geometry, etc.

          // For primary_actor_class root with vru/construction_sign groups
          if (root === 'primary_actor_class' && grp !== 'actor') attrKey = 'primary_actor_class';

          attributes[attrKey] = s;
        }
      }
    }
  }

  // Generate one label per frame
  const labels = [];
  for (let f = 1; f <= frameCount; f++) {
    const frameNum = String(f).padStart(6, '0');
    labels.push({
      label_type: "frame_attributes",
      sensor_id: "frame_attributes",
      label_category_id: "frame_attributes",
      label_id: "frame_attributes:1",
      file_id: `fps_${fps}_frame_${frameNum}.jpg`,
      stage_id: "Labelling",
      attributes: { ...attributes },
      create_time_millis: now,
      label_set_id: labelSetId,
      labeller_email: email,
      update_time_millis: now,
      user_id: email,
      version: 1,
      attributes_source: {},
      dataset_name: state.name
    });
  }

  const output = { labels };
  dl(state.name + '.json', JSON.stringify(output, null, 4), 'application/json');
}

function copyJSON() {
  const out = {
    sequence_name: state.name,
    file: state.name + '.mp4',
    tags: [...state.selected].sort()
  };
  navigator.clipboard.writeText(JSON.stringify(out, null, 2))
    .then(() => {
      const btn = event.currentTarget;
      btn.textContent = ' Copied!';
      setTimeout(() => btn.textContent = ' Copy JSON', 1600);
    })
    .catch(() => alert(JSON.stringify(out, null, 2)));
}

function dl(fname, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
